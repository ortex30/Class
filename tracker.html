<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Habits</title>
  <meta name="description" content="Track daily habits, build streaks, and check off the last 7 days." />
  <meta name="theme-color" content="#fbfaf8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14151a" media="(prefers-color-scheme: dark)" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />

  <!-- Apply the saved theme before first paint so the page never flashes. -->
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>

  <style>
    :root {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff; --done:#0f9d58;
      --radius:10px; --radius-sm:4px;
    }
    /* Dark mode for visitors who have NOT picked a theme themselves. */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8; --line:#2c2f3a;
        --accent:#8ea9ff; --accent-soft:#232838; --done:#4ecb7d;
      }
    }
    /* An explicit choice from the toggle wins over the media query, both ways. */
    html[data-theme='light'] {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff; --done:#0f9d58;
    }
    html[data-theme='dark'] {
      --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8; --line:#2c2f3a;
      --accent:#8ea9ff; --accent-soft:#232838; --done:#4ecb7d;
    }

    * { box-sizing: border-box; }
    :where(a, button, input, textarea, select):focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px 72px; }

    .home {
      display: inline-block; color: var(--muted); text-decoration: none;
      font-size: 14px; margin-bottom: 18px;
    }
    .home:hover { color: var(--accent); }

    h1 { font-size: clamp(26px, 5vw, 36px); margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; }

    .adder { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type=text] {
      padding: 12px 14px; font-size: 16px; color: var(--ink);
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm);
    }
    input[type=text]:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .emoji-input { width: 60px; text-align: center; flex: none; }
    .name-input { flex: 1; min-width: 0; }
    button {
      font-size: 15px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm);
      border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 12px 16px;
    }
    button:hover { filter: brightness(1.05); }

    /* Stats strip: "X of Y done today" plus a progress bar. */
    .strip { margin: 18px 2px 14px; }
    .strip-label { font-size: 14px; color: var(--muted); margin: 0 0 6px; }
    .bar {
      height: 8px; background: var(--accent-soft); border: 1px solid var(--line);
      border-radius: 999px; overflow: hidden;
    }
    .bar-fill { height: 100%; width: 0%; background: var(--accent); transition: width .2s ease; }

    .list { margin: 0; padding: 0; }
    .habit {
      background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    }
    .habit-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .habit-emoji { font-size: 22px; flex: none; }
    .habit-name { flex: 1; min-width: 0; font-size: 16px; font-weight: 600; word-break: break-word; }
    .streak { font-size: 14px; color: var(--muted); white-space: nowrap; flex: none; }
    .week { font-size: 13px; color: var(--muted); white-space: nowrap; flex: none; }
    .del {
      background: none; border: none; color: var(--muted); font-size: 18px;
      padding: 4px 8px; flex: none;
    }
    .del:hover { color: #d33; }

    /* Seven day-cells: oldest on the left, today on the right. */
    .days-row { display: flex; gap: 6px; }
    .day {
      flex: 1 1 0; min-width: 0; height: 44px; padding: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm);
      color: var(--muted); font-weight: 600; cursor: pointer;
    }
    .day:hover { border-color: var(--accent); }
    .day .dinit { font-size: 11px; letter-spacing: .02em; }
    .day .dmark { font-size: 13px; height: 14px; line-height: 14px; }
    .day.done { background: var(--done); border-color: var(--done); color: #fff; }
    .day.today { box-shadow: 0 0 0 2px var(--accent); border-color: var(--accent); }

    .empty { color: var(--muted); text-align: center; padding: 28px 0; }

    .toggle {
      position: fixed; top: 16px; right: 16px; background: var(--card);
      border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px;
      font-size: 13px; font-weight: 600; cursor: pointer; color: var(--ink);
    }
  </style>
</head>
<body>
  <button class="toggle" id="themeBtn" aria-label="Toggle dark mode">🌙 Theme</button>

  <div class="wrap">
    <a class="home" href="index.html">← Home</a>
    <h1>Daily Habits</h1>
    <p class="sub">Add a habit, then tap a day to check it off. It saves automatically.</p>

    <form class="adder" id="adder">
      <input type="text" class="emoji-input" id="newEmoji" placeholder="😀" aria-label="Emoji (optional)" autocomplete="off" />
      <input type="text" class="name-input" id="newName" placeholder="New habit, e.g. Read 10 pages" aria-label="Habit name" autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <div class="strip" id="strip">
      <p class="strip-label" id="stripLabel" aria-live="polite"></p>
      <div class="bar" role="progressbar" id="bar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Habits completed today">
        <div class="bar-fill" id="barFill"></div>
      </div>
    </div>

    <div class="list" id="list"></div>
  </div>

  <script>
    // ----- Storage -----
    const KEY = "habits-v1";
    // Each habit: { id, emoji, name, days } where days maps "YYYY-MM-DD" -> true.
    let habits = load();

    function load() {
      try {
        const data = JSON.parse(localStorage.getItem(KEY) || "[]");
        return Array.isArray(data) ? data : [];
      } catch (e) {
        return [];
      }
    }
    function save() { localStorage.setItem(KEY, JSON.stringify(habits)); }

    // ----- Date helpers -----
    const WEEKDAY_INITIALS = ["S", "M", "T", "W", "T", "F", "S"];
    const WEEKDAYS_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
    const MONTHS_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun",
                          "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

    // Build "YYYY-MM-DD" from LOCAL date parts. We never use toISOString here
    // because that returns UTC, which can shift the day near midnight.
    function dateKey(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }

    function labelFor(d, done) {
      return WEEKDAYS_SHORT[d.getDay()] + " " + MONTHS_SHORT[d.getMonth()] + " " +
             d.getDate() + ", " + (done ? "done" : "not done");
    }

    function makeId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // Consecutive done days ending today. If today isn't checked yet, the streak
    // is still alive if it ends yesterday; otherwise it's zero.
    function currentStreak(habit, today) {
      let cursor = new Date(today);
      if (!habit.days[dateKey(cursor)]) {
        cursor.setDate(cursor.getDate() - 1);
        if (!habit.days[dateKey(cursor)]) return 0;
      }
      let count = 0;
      while (habit.days[dateKey(cursor)]) {
        count++;
        cursor.setDate(cursor.getDate() - 1);
      }
      return count;
    }

    // ----- Actions -----
    function addHabit(emoji, name) {
      habits.push({ id: makeId(), emoji: emoji || "✅", name: name, days: {} });
      save();
      render();
    }

    function toggleDay(id, key) {
      const habit = habits.find(function (h) { return h.id === id; });
      if (!habit) return;
      if (habit.days[key]) {
        delete habit.days[key];
      } else {
        habit.days[key] = true;
      }
      save();
      render();
    }

    function deleteHabit(id) {
      habits = habits.filter(function (h) { return h.id !== id; });
      save();
      render();
    }

    // ----- Rendering -----
    const listEl = document.getElementById("list");
    const stripEl = document.getElementById("strip");
    const stripLabel = document.getElementById("stripLabel");
    const barEl = document.getElementById("bar");
    const barFill = document.getElementById("barFill");
    const form = document.getElementById("adder");
    const emojiInput = document.getElementById("newEmoji");
    const nameInput = document.getElementById("newName");

    function render() {
      const today = new Date();
      const todayKey = dateKey(today);

      // Last 7 days, oldest first (left) through today (right).
      const week = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        week.push(d);
      }

      // Stats strip.
      const total = habits.length;
      const doneToday = habits.filter(function (h) { return h.days[todayKey]; }).length;
      const pct = total ? Math.round((doneToday / total) * 100) : 0;
      stripEl.style.display = total ? "block" : "none";
      stripLabel.textContent = (total > 0 && doneToday === total)
        ? "All " + total + " done today 🎉"
        : doneToday + " of " + total + " done today";
      barFill.style.width = pct + "%";
      barEl.setAttribute("aria-valuenow", String(pct));

      // Habit list (or empty state).
      listEl.innerHTML = "";
      if (total === 0) {
        const empty = document.createElement("p");
        empty.className = "empty";
        empty.textContent = "No habits yet. Add your first one above.";
        listEl.appendChild(empty);
        return;
      }
      habits.forEach(function (habit) {
        listEl.appendChild(renderHabit(habit, week, today, todayKey));
      });
    }

    function renderHabit(habit, week, today, todayKey) {
      const card = document.createElement("div");
      card.className = "habit";

      const top = document.createElement("div");
      top.className = "habit-top";

      const emoji = document.createElement("span");
      emoji.className = "habit-emoji";
      emoji.textContent = habit.emoji;

      const name = document.createElement("span");
      name.className = "habit-name";
      name.textContent = habit.name;

      const streak = document.createElement("span");
      streak.className = "streak";
      const s = currentStreak(habit, today);
      streak.textContent = "🔥 " + s;
      streak.setAttribute("aria-label", s + " day streak");

      // How many of the 7 visible days are checked (separate from the all-time streak).
      const weekDone = week.filter(function (d) { return habit.days[dateKey(d)]; }).length;
      const weekEl = document.createElement("span");
      weekEl.className = "week";
      weekEl.textContent = weekDone + "/7 this week";
      weekEl.setAttribute("aria-label", weekDone + " of 7 days done this week");

      const del = document.createElement("button");
      del.className = "del";
      del.type = "button";
      del.textContent = "×";
      del.setAttribute("aria-label", "Delete " + habit.name);
      del.addEventListener("click", function () {
        // Only nag when there is history to lose; empty habits delete instantly.
        const hasHistory = Object.keys(habit.days).some(function (k) { return habit.days[k]; });
        if (hasHistory && !confirm('Delete "' + habit.name + '" and its history?')) return;
        deleteHabit(habit.id);
      });

      top.append(emoji, name, streak, weekEl, del);

      const daysRow = document.createElement("div");
      daysRow.className = "days-row";
      week.forEach(function (d) {
        daysRow.appendChild(renderDay(habit, d, todayKey));
      });

      card.append(top, daysRow);
      return card;
    }

    function renderDay(habit, d, todayKey) {
      const key = dateKey(d);
      const done = !!habit.days[key];
      const isToday = key === todayKey;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "day" + (done ? " done" : "") + (isToday ? " today" : "");
      btn.setAttribute("aria-pressed", done ? "true" : "false");
      btn.setAttribute("aria-label", labelFor(d, done));

      const init = document.createElement("span");
      init.className = "dinit";
      init.textContent = WEEKDAY_INITIALS[d.getDay()];

      const mark = document.createElement("span");
      mark.className = "dmark";
      mark.textContent = done ? "✓" : "";

      btn.append(init, mark);
      btn.addEventListener("click", function () { toggleDay(habit.id, key); });
      return btn;
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return; // reject empty names
      addHabit(emojiInput.value.trim(), name);
      emojiInput.value = "";
      nameInput.value = "";
      nameInput.focus();
    });

    // ----- Theme toggle (shares the "theme" key with index.html) -----
    const themeBtn = document.getElementById("themeBtn");
    function currentIsDark() {
      const attr = document.documentElement.getAttribute("data-theme");
      if (attr) return attr === "dark";
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    // Label shows the theme the button will switch TO, not the current one.
    function updateThemeLabel() {
      const dark = currentIsDark();
      themeBtn.textContent = dark ? "☀️ Light" : "🌙 Dark";
      themeBtn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
    }
    themeBtn.addEventListener("click", function () {
      const next = currentIsDark() ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
      updateThemeLabel();
    });
    updateThemeLabel();

    render();
  </script>
</body>
</html>
