<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tracker</title>
  <meta name="description" content="A simple tracker you can add to and check off." />
  <style>
    :root {
      --bg:#fbfaf8; --card:#fff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff; --done:#0f9d58; --radius:10px; --radius-sm:4px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8;
        --line:#2c2f3a; --accent:#8ea9ff; --accent-soft:#232838; --done:#4ecb7d; }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height:1.5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px 72px; }
    h1 { font-size: clamp(26px,5vw,36px); margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 24px; }
    .adder { display: flex; gap: 8px; margin-bottom: 8px; }
    input[type=text] {
      flex: 1; padding: 12px 14px; font-size: 16px; color: var(--ink);
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-sm);
    }
    input[type=text]:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    button {
      font-size: 15px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm);
      border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 12px 16px;
    }
    button:hover { filter: brightness(1.05); }
    .stats { color: var(--muted); font-size: 14px; margin: 14px 2px 8px; }
    ul { list-style: none; margin: 0; padding: 0; }
    li {
      display: flex; align-items: center; gap: 12px; background: var(--card);
      border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
    }
    li.done .label { text-decoration: line-through; color: var(--muted); }
    .check {
      width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--line);
      display: grid; place-items: center; cursor: pointer; flex: none; font-size: 14px; color: transparent;
    }
    li.done .check { background: var(--done); border-color: var(--done); color: #fff; }
    .label { flex: 1; font-size: 16px; }
    .del { background: none; border: none; color: var(--muted); font-size: 18px; padding: 4px 8px; }
    .del:hover { color: #d33; }
    .empty { color: var(--muted); text-align: center; padding: 28px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>My Tracker</h1>
    <p class="sub">Add things. Check them off. It saves automatically.</p>

    <form class="adder" id="adder">
      <input type="text" id="newItem" placeholder="Add something to track..." autocomplete="off" />
      <button type="submit">Add</button>
    </form>

    <p class="stats" id="stats"></p>
    <ul id="list"></ul>
  </div>

  <script>
    const KEY = "tracker-items";
    let items = JSON.parse(localStorage.getItem(KEY) || "[]");

    const listEl = document.getElementById("list");
    const statsEl = document.getElementById("stats");
    const form = document.getElementById("adder");
    const input = document.getElementById("newItem");

    function save() { localStorage.setItem(KEY, JSON.stringify(items)); }

    function render() {
      listEl.innerHTML = "";
      if (items.length === 0) {
        listEl.innerHTML = '<p class="empty">Nothing yet. Add your first item above.</p>';
      }
      items.forEach((item, i) => {
        const li = document.createElement("li");
        if (item.done) li.classList.add("done");

        const check = document.createElement("div");
        check.className = "check";
        check.textContent = "✓";
        check.setAttribute("role", "button");
        check.addEventListener("click", () => { items[i].done = !items[i].done; save(); render(); });

        const label = document.createElement("span");
        label.className = "label";
        label.textContent = item.text;

        const del = document.createElement("button");
        del.className = "del";
        del.type = "button";
        del.textContent = "×";
        del.setAttribute("aria-label", "Delete");
        del.addEventListener("click", () => { items.splice(i, 1); save(); render(); });

        li.append(check, label, del);
        listEl.appendChild(li);
      });
      const done = items.filter(x => x.done).length;
      statsEl.textContent = items.length
        ? done + " of " + items.length + " done"
        : "";
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      input.value = "";
      save();
      render();
    });

    render();
  </script>
</body>
</html>
