<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz</title>
  <meta name="description" content="Answer a few questions, get a result." />
  <style>
    :root {
      --bg:#fbfaf8; --card:#fff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff; --radius:10px; --radius-sm:4px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8;
        --line:#2c2f3a; --accent:#8ea9ff; --accent-soft:#232838; }
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height:1.5; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px 72px; }
    h1 { font-size: clamp(26px,5vw,36px); margin: 0 0 4px; }
    .sub { color: var(--muted); margin: 0 0 8px; }
    .progress { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 18px 0 26px; }
    .bar { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }
    .q { font-size: 20px; font-weight: 600; margin: 0 0 18px; }
    .options { display: grid; gap: 10px; }
    .opt {
      text-align: left; font-size: 16px; padding: 14px 16px; cursor: pointer;
      background: var(--card); color: var(--ink); border: 1px solid var(--line);
      border-radius: var(--radius); transition: border-color .12s ease, background .12s ease;
    }
    .opt:hover { border-color: var(--accent); background: var(--accent-soft); }
    .result { text-align: center; padding: 12px 0; }
    .result .emoji { font-size: 64px; display: block; margin-bottom: 8px; }
    .result h2 { font-size: 28px; margin: 0 0 8px; }
    .result p { color: var(--muted); font-size: 17px; margin: 0 0 24px; }
    .again {
      font-size: 15px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm);
      border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 12px 20px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Which study snack are you?</h1>
    <p class="sub">Answer 3 quick questions.</p>
    <div class="progress"><div class="bar" id="bar"></div></div>

    <div id="quiz">
      <p class="q" id="question"></p>
      <div class="options" id="options"></div>
    </div>

    <div id="result" class="result hidden">
      <span class="emoji" id="rEmoji"></span>
      <h2 id="rTitle"></h2>
      <p id="rText"></p>
      <button class="again" id="again">Try again</button>
    </div>
  </div>

  <script>
    // Each answer adds points to one of the result keys.
    const questions = [
      {
        text: "It's midnight before a big test. What's the vibe?",
        options: [
          { label: "Locked in, headphones on", points: "coffee" },
          { label: "Cozy blanket, one more chapter", points: "cocoa" },
          { label: "Snacking and half-scrolling", points: "chips" },
        ],
      },
      {
        text: "Pick a place to study.",
        options: [
          { label: "A loud cafe", points: "coffee" },
          { label: "My bed", points: "cocoa" },
          { label: "The kitchen table (near the fridge)", points: "chips" },
        ],
      },
      {
        text: "How do you take a break?",
        options: [
          { label: "I don't, keep going", points: "coffee" },
          { label: "A short nap", points: "cocoa" },
          { label: "A snack run", points: "chips" },
        ],
      },
    ];

    const results = {
      coffee: { emoji: "☕", title: "Cold Brew", text: "Focused and relentless. You run on momentum." },
      cocoa:  { emoji: "🍫", title: "Hot Cocoa", text: "Calm and steady. You study best when you're comfy." },
      chips:  { emoji: "🍿", title: "Snack Mix", text: "Social and easily tempted, but you always finish." },
    };

    let current = 0;
    const scores = { coffee: 0, cocoa: 0, chips: 0 };

    const qEl = document.getElementById("question");
    const optsEl = document.getElementById("options");
    const barEl = document.getElementById("bar");
    const quizEl = document.getElementById("quiz");
    const resultEl = document.getElementById("result");

    function showQuestion() {
      const q = questions[current];
      qEl.textContent = q.text;
      barEl.style.width = (current / questions.length) * 100 + "%";
      optsEl.innerHTML = "";
      q.options.forEach((opt) => {
        const b = document.createElement("button");
        b.className = "opt";
        b.textContent = opt.label;
        b.addEventListener("click", () => {
          scores[opt.points]++;
          current++;
          if (current < questions.length) showQuestion();
          else showResult();
        });
        optsEl.appendChild(b);
      });
    }

    function showResult() {
      barEl.style.width = "100%";
      let winner = "coffee";
      for (const key in scores) if (scores[key] > scores[winner]) winner = key;
      const r = results[winner];
      document.getElementById("rEmoji").textContent = r.emoji;
      document.getElementById("rTitle").textContent = r.title;
      document.getElementById("rText").textContent = r.text;
      quizEl.classList.add("hidden");
      resultEl.classList.remove("hidden");
    }

    document.getElementById("again").addEventListener("click", () => {
      current = 0;
      for (const k in scores) scores[k] = 0;
      resultEl.classList.add("hidden");
      quizEl.classList.remove("hidden");
      showQuestion();
    });

    showQuestion();
  </script>
</body>
</html>
