<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#fbfaf8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14151a" media="(prefers-color-scheme: dark)" />
  <title>Web Basics Quiz</title>
  <meta name="description" content="An 8-question study quiz on beginner web knowledge: HTML, CSS, JavaScript, and how the web works." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>" />

  <!-- Set the saved theme before the page paints, so there is no flash. -->
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>

  <style>
    /* Light values are the default. */
    :root {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff;
      --good:#1f8a4c; --good-soft:#e6f4ec; --bad:#c23b32; --bad-soft:#fbe9e7;
      --radius:10px; --radius-sm:4px;
    }
    /* If the visitor made no explicit choice, follow the system setting. */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8; --line:#2c2f3a;
        --accent:#8ea9ff; --accent-soft:#232838;
        --good:#5fd08a; --good-soft:#1a2a20; --bad:#f0857d; --bad-soft:#2c1c1b;
      }
    }
    /* An explicit choice wins over the system setting, in both directions. */
    html[data-theme='dark'] {
      --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8; --line:#2c2f3a;
      --accent:#8ea9ff; --accent-soft:#232838;
      --good:#5fd08a; --good-soft:#1a2a20; --bad:#f0857d; --bad-soft:#2c1c1b;
    }
    html[data-theme='light'] {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff;
      --good:#1f8a4c; --good-soft:#e6f4ec; --bad:#c23b32; --bad-soft:#fbe9e7;
    }

    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height:1.5;
      -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 48px 20px 72px; }

    .home { display: inline-block; margin-bottom: 22px; color: var(--muted);
      text-decoration: none; font-size: 14px; }
    .home:hover { color: var(--accent); }

    .titlerow { display: flex; align-items: baseline; justify-content: space-between;
      gap: 12px; flex-wrap: wrap; }
    h1 { font-size: clamp(26px,5vw,36px); margin: 0 0 4px; }
    .best { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .sub { color: var(--muted); margin: 0 0 8px; }

    .progress { height: 6px; background: var(--line); border-radius: 999px; overflow: hidden; margin: 18px 0 26px; }
    .bar { height: 100%; width: 0%; background: var(--accent); transition: width .25s ease; }

    .count { font-size: 13px; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--accent); font-weight: 700; margin: 0 0 10px; }
    .q { font-size: 20px; font-weight: 600; margin: 0 0 18px; }
    .options { display: grid; gap: 10px; }
    .opt {
      text-align: left; font-size: 16px; padding: 14px 16px; cursor: pointer;
      background: var(--card); color: var(--ink); border: 1px solid var(--line);
      border-radius: var(--radius); transition: border-color .12s ease, background .12s ease;
    }
    .opt:not(:disabled):hover { border-color: var(--accent); background: var(--accent-soft); }
    .opt:disabled { cursor: default; }
    /* Feedback after a pick: right answer green, chosen wrong answer red. */
    .opt.correct { border-color: var(--good); background: var(--good-soft); }
    .opt.wrong { border-color: var(--bad); background: var(--bad-soft); }

    .explain { background: var(--accent-soft); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 12px 14px; margin: 16px 0 0; font-size: 15px; }
    .explain strong { color: var(--accent); }

    .btn { font-size: 15px; font-weight: 600; cursor: pointer; border-radius: var(--radius-sm);
      border: 1px solid var(--accent); background: var(--accent); color: #fff; padding: 12px 20px; }
    .next-row { margin-top: 18px; }

    .result { text-align: center; padding: 12px 0; }
    .result .emoji { font-size: 64px; display: block; margin-bottom: 8px; }
    .result h2 { font-size: 28px; margin: 0 0 8px; }
    .result .score { color: var(--muted); font-size: 17px; margin: 0 0 6px; }
    .result .msg { font-size: 17px; margin: 0 0 20px; }

    .callout { background: var(--accent-soft); border: 1px solid var(--accent);
      border-radius: var(--radius); padding: 10px 14px; margin: 0 auto 18px; font-weight: 700;
      color: var(--accent); max-width: 320px; }

    .review { text-align: left; margin: 24px 0; }
    .review h3 { font-size: 15px; margin: 0 0 12px; }
    .review-item { border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px 14px; margin-bottom: 10px; background: var(--card); }
    .review-item .qtext { font-weight: 600; margin: 0 0 4px; font-size: 15px; }
    .review-item .ans { color: var(--good); font-size: 14px; margin: 0; }

    .toggle { position: fixed; top: 16px; right: 16px; background: var(--card);
      border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px;
      font-size: 13px; cursor: pointer; color: var(--ink); }

    .hidden { display: none; }

    /* Muted keyboard hint under the options; hidden on touch devices. */
    .hint { font-size: 13px; color: var(--muted); margin: 10px 0 0; }
    @media (pointer: coarse) { .hint { display: none; } }

    /* Keyboard users always see where focus is. */
    :where(a, button, input, textarea, select):focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }
    /* Respect a reduced-motion preference. */
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <button class="toggle" id="themeBtn" aria-label="Toggle dark mode">🌙 Theme</button>

  <div class="wrap">
    <a class="home" href="index.html">← Home</a>

    <div class="titlerow">
      <h1>Web Basics Quiz</h1>
      <span class="best" id="best"></span>
    </div>
    <p class="sub">8 quick questions on HTML, CSS, JavaScript, and how the web works.</p>
    <div class="progress"><div class="bar" id="bar"></div></div>

    <!-- One question at a time. -->
    <div id="quiz">
      <p class="count" id="count"></p>
      <p class="q" id="question"></p>
      <div class="options" id="options"></div>
      <p class="hint" id="hint">Tip: press 1–4 to answer</p>
      <div class="explain hidden" id="explain"><strong>Why:</strong> <span id="explainText"></span></div>
      <div class="next-row hidden" id="nextRow">
        <button class="btn" id="next"></button>
      </div>
    </div>

    <!-- Results screen. -->
    <div id="result" class="result hidden">
      <span class="emoji" id="rEmoji"></span>
      <h2 id="rTitle"></h2>
      <div class="callout hidden" id="callout">🎯 New best!</div>
      <p class="score" id="rScore"></p>
      <p class="msg" id="rMsg"></p>
      <div class="review hidden" id="review">
        <h3>Questions to review</h3>
        <div id="reviewList"></div>
      </div>
      <button class="btn again" id="again">Try again</button>
    </div>
  </div>

  <script>
    // --- Theme toggle: flips data-theme on <html> and saves the choice. ---
    var themeBtn = document.getElementById("themeBtn");
    function currentIsDark() {
      var attr = document.documentElement.getAttribute("data-theme");
      if (attr) return attr === "dark";
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    }
    // Label shows the theme the button will switch TO.
    function updateThemeLabel() {
      var dark = currentIsDark();
      themeBtn.textContent = dark ? "☀️ Light" : "🌙 Dark";
      themeBtn.setAttribute("aria-label", dark ? "Switch to light mode" : "Switch to dark mode");
    }
    themeBtn.addEventListener("click", function () {
      var next = currentIsDark() ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next); // same key index.html uses
      updateThemeLabel();
    });
    updateThemeLabel();

    // --- Quiz data. "correct" is the index of the right option. ---
    var QUESTIONS = [
      {
        text: "What is an HTML tag?",
        options: [
          "A label that tells the browser what a piece of content is",
          "A color you pick for the background",
          "A password that protects the page",
          "A photo saved on your computer"
        ],
        correct: 0,
        explain: "Tags like <p> or <h1> mark up content so the browser knows how to treat it."
      },
      {
        text: "What does CSS mainly control on a web page?",
        options: [
          "How the page connects to the internet",
          "How the page looks — colors, fonts, and layout",
          "What the page does when you click a button",
          "Where the files are stored online"
        ],
        correct: 1,
        explain: "CSS is for styling: it decides the look and layout of the page."
      },
      {
        text: "What is JavaScript mainly used for on a web page?",
        options: [
          "Choosing the page's web address",
          "Storing the site on a server",
          "Making the page interactive and responding to actions",
          "Setting the font size only"
        ],
        correct: 2,
        explain: "JavaScript adds behavior, like reacting when someone clicks or types."
      },
      {
        text: "What does the browser's localStorage do?",
        options: [
          "Sends your data to every other website",
          "Saves small bits of data on your device so they're still there next visit",
          "Deletes the page after you close it",
          "Makes the internet connection faster"
        ],
        correct: 1,
        explain: "localStorage keeps small values on the visitor's own device between visits."
      },
      {
        text: "What is a URL?",
        options: [
          "The address of a page or file on the web",
          "A type of image format",
          "A button that submits a form",
          "The name of a programming language"
        ],
        correct: 0,
        explain: "A URL (like example.com/page) is the address that points to a page or file."
      },
      {
        text: "What does the command `git push` do?",
        options: [
          "Deletes your project folder",
          "Opens the page in a browser",
          "Uploads your saved commits to a remote repository like GitHub",
          "Installs new software on your computer"
        ],
        correct: 2,
        explain: "git push sends the commits from your computer up to the remote repo."
      },
      {
        text: "Which HTML tag makes the biggest top-level heading?",
        options: [ "<p>", "<h1>", "<div>", "<span>" ],
        correct: 1,
        explain: "<h1> is the largest, most important heading; <p> is a plain paragraph."
      },
      {
        text: "What is the main job of a web browser?",
        options: [
          "To write the code for you automatically",
          "To store your passwords for other apps",
          "To download web files and turn them into the page you see",
          "To design logos and images"
        ],
        correct: 2,
        explain: "A browser fetches HTML, CSS, and JS files and renders them as a page."
      }
    ];

    // --- Result tiers, chosen by score out of 8. ---
    var TIERS = [
      { min: 8, emoji: "🏆", title: "Perfect!",      msg: "You know your web basics inside out." },
      { min: 6, emoji: "🎉", title: "Great work!",   msg: "You've got a strong grip on the basics." },
      { min: 4, emoji: "📚", title: "Getting there", msg: "A little more review and you'll nail it." },
      { min: 0, emoji: "💪", title: "Keep practicing", msg: "Try again and watch your score climb." }
    ];

    var TOTAL = QUESTIONS.length;
    var BEST_KEY = "quiz-best-v1";

    // Elements.
    var countEl = document.getElementById("count");
    var qEl = document.getElementById("question");
    var optsEl = document.getElementById("options");
    var explainEl = document.getElementById("explain");
    var explainTextEl = document.getElementById("explainText");
    var nextRow = document.getElementById("nextRow");
    var nextBtn = document.getElementById("next");
    var barEl = document.getElementById("bar");
    var bestEl = document.getElementById("best");
    var quizEl = document.getElementById("quiz");
    var resultEl = document.getElementById("result");
    var hintEl = document.getElementById("hint");

    // Round state, rebuilt on every start / restart.
    var round = [];   // shuffled questions, each with shuffled options
    var current = 0;
    var score = 0;

    // Fisher-Yates shuffle: returns a new shuffled copy of an array.
    function shuffle(list) {
      var a = list.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
      }
      return a;
    }

    // Build a fresh round with question order and option order reshuffled.
    // The correct answer is tracked by VALUE, then re-found after shuffling.
    function buildRound() {
      round = shuffle(QUESTIONS).map(function (q) {
        var correctValue = q.options[q.correct];
        var options = shuffle(q.options);
        return {
          text: q.text,
          options: options,
          correct: options.indexOf(correctValue),
          explain: q.explain,
          missed: false
        };
      });
    }

    function showBest() {
      var best = parseInt(localStorage.getItem(BEST_KEY), 10);
      if (!isNaN(best)) bestEl.textContent = "Best: " + best + "/" + TOTAL;
      else bestEl.textContent = "";
    }

    function showQuestion() {
      var q = round[current];
      countEl.textContent = "Question " + (current + 1) + " of " + TOTAL;
      qEl.textContent = q.text;
      barEl.style.width = (current / TOTAL) * 100 + "%";

      explainEl.classList.add("hidden");
      nextRow.classList.add("hidden");
      hintEl.classList.remove("hidden");
      optsEl.innerHTML = "";

      q.options.forEach(function (label, i) {
        var b = document.createElement("button");
        b.className = "opt";
        b.textContent = label;
        b.addEventListener("click", function () { pick(i); });
        optsEl.appendChild(b);
      });
    }

    // Handle an answer: show feedback, lock the options, reveal the explanation.
    function pick(chosen) {
      var q = round[current];
      var buttons = optsEl.querySelectorAll(".opt");

      buttons.forEach(function (b, i) {
        b.disabled = true;
        if (i === q.correct) b.classList.add("correct");
        if (i === chosen && chosen !== q.correct) b.classList.add("wrong");
      });

      if (chosen === q.correct) score++;
      else q.missed = true;

      // textContent (not innerHTML) so option text like "<h1>" shows literally.
      explainTextEl.textContent = q.explain;
      explainEl.classList.remove("hidden");

      nextBtn.textContent = (current === TOTAL - 1) ? "See results" : "Next";
      nextRow.classList.remove("hidden");
      hintEl.classList.add("hidden");
    }

    nextBtn.addEventListener("click", function () {
      current++;
      if (current < TOTAL) showQuestion();
      else showResult();
    });

    // Keyboard play: number keys pick an answer; Enter advances once answered.
    document.addEventListener("keydown", function (e) {
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (quizEl.classList.contains("hidden")) return; // only during the quiz

      var answered = !nextRow.classList.contains("hidden");
      if (!answered) {
        var buttons = optsEl.querySelectorAll(".opt");
        var n = parseInt(e.key, 10);
        if (n >= 1 && n <= buttons.length) {
          e.preventDefault();
          pick(n - 1);
        }
        return;
      }

      // Answered: Enter advances, unless the button already has focus (native).
      if (e.key === "Enter" && e.target !== nextBtn) {
        e.preventDefault();
        nextBtn.click();
      }
    });

    function pickTier() {
      for (var i = 0; i < TIERS.length; i++) {
        if (score >= TIERS[i].min) return TIERS[i];
      }
      return TIERS[TIERS.length - 1];
    }

    function showResult() {
      barEl.style.width = "100%";

      var tier = pickTier();
      var percent = Math.round((score / TOTAL) * 100);

      document.getElementById("rEmoji").textContent = tier.emoji;
      document.getElementById("rTitle").textContent = tier.title;
      document.getElementById("rScore").textContent =
        "You scored " + score + " out of " + TOTAL + " (" + percent + "%).";
      document.getElementById("rMsg").textContent = tier.msg;

      // Best score: beat it -> save and celebrate.
      var best = parseInt(localStorage.getItem(BEST_KEY), 10);
      var callout = document.getElementById("callout");
      if (isNaN(best) || score > best) {
        localStorage.setItem(BEST_KEY, String(score));
        if (!isNaN(best) && score > best) callout.classList.remove("hidden");
        else callout.classList.add("hidden");
      } else {
        callout.classList.add("hidden");
      }
      showBest();

      // Review list: only the questions that were missed.
      var review = document.getElementById("review");
      var reviewList = document.getElementById("reviewList");
      reviewList.innerHTML = "";
      var missed = round.filter(function (q) { return q.missed; });
      if (missed.length === 0) {
        review.classList.add("hidden");
      } else {
        missed.forEach(function (q) {
          var item = document.createElement("div");
          item.className = "review-item";
          var qt = document.createElement("p");
          qt.className = "qtext";
          qt.textContent = q.text;
          var ans = document.createElement("p");
          ans.className = "ans";
          ans.textContent = "Correct answer: " + q.options[q.correct];
          item.appendChild(qt);
          item.appendChild(ans);
          reviewList.appendChild(item);
        });
        review.classList.remove("hidden");
      }

      quizEl.classList.add("hidden");
      resultEl.classList.remove("hidden");
    }

    // Start (or restart) the quiz.
    function start() {
      current = 0;
      score = 0;
      buildRound();
      resultEl.classList.add("hidden");
      quizEl.classList.remove("hidden");
      showQuestion();
    }

    document.getElementById("again").addEventListener("click", start);

    showBest();
    start();
  </script>
</body>
</html>
