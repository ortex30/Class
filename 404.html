<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found</title>
  <meta name="description" content="That page doesn't exist — head back to the launchpad." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />
  <meta name="theme-color" content="#fbfaf8" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#14151a" media="(prefers-color-scheme: dark)" />
  <script>
    // Respect the theme picked on the other pages, before first paint.
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
  <style>
    :root {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e7e3dc;
      --accent:#2f5bea; --accent-soft:#eaf0ff; --radius:10px; --radius-sm:4px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8;
        --line:#2c2f3a; --accent:#8ea9ff; --accent-soft:#232838; }
    }
    html[data-theme='dark'] {
      --bg:#14151a; --card:#1c1e26; --ink:#f2f2f2; --muted:#a0a0a8;
      --line:#2c2f3a; --accent:#8ea9ff; --accent-soft:#232838;
    }
    html[data-theme='light'] {
      --bg:#fbfaf8; --card:#ffffff; --ink:#1a1a1a; --muted:#6b6b6b;
      --line:#e7e3dc; --accent:#2f5bea; --accent-soft:#eaf0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      line-height: 1.5; min-height: 100vh; display: grid; place-items: center;
    }
    main { text-align: center; padding: 40px 20px; }
    .big { font-size: 72px; margin: 0 0 8px; }
    h1 { font-size: clamp(24px, 5vw, 32px); margin: 0 0 8px; }
    p { color: var(--muted); margin: 0 0 24px; }
    a {
      display: inline-block; font-size: 15px; font-weight: 600; text-decoration: none;
      border-radius: var(--radius-sm); border: 1px solid var(--accent);
      background: var(--accent); color: #fff; padding: 12px 20px;
    }
    a:hover { filter: brightness(1.05); }
    :where(a):focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <main>
    <p class="big">🧭</p>
    <h1>That page doesn't exist</h1>
    <p>The link may be old or mistyped — everything that does exist is on the launchpad.</p>
    <a href="index.html">← Back to the launchpad</a>
  </main>
</body>
</html>
